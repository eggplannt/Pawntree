services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chess_trainer
      POSTGRES_USER: chess
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess -d chess_trainer"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    env_file:
      - ./server/.env
    environment:
      DATABASE_URL: postgres://chess:devpassword@postgres:5432/chess_trainer
      PORT: "8080"
      ENV: development
    ports:
      - "8080:8080"
    volumes:
      - ./server:/app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata_dev:
